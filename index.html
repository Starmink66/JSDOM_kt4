<!DOCTYPE html>
<html>
<head>
<style>
  .slider-container {
    position: relative;
    width: 300px;
    height: 50px;
    margin: 50px;
  }
  .track {
    width: 300px;
    height: 10px;
    background: #ccc;
    position: absolute;
    top: 20px;
    z-index: 0; 
  }
  .point {
    position: absolute;
    top: 15px;
    width: 10px;
    height: 20px;
    border-radius: 20px;
    background: #999;
    z-index: 0; 
  }
  .tumbler {
    width: 20px;
    height: 20px;
    background: red;
    position: absolute;
    border-radius: 20px;
    top: 15px;
    left: -5px; 
    z-index: 1; 
  }
</style>
</head>
<body>
  <div class="slider-container" id="container">
    <div class="track"></div>
    <div class="tumbler" id="tumbler"></div>
  </div>

  <script>
    const container = document.getElementById('container');
    const tumbler = document.getElementById('tumbler');
    const values = [0, 20, 40, 60, 80, 100];
    const trackWidth = 300;

    values.forEach((val) => {
      const point = document.createElement('div');
      point.className = 'point';
      const number = document.createElement('p');
      number.innerText = val
      point.appendChild(number)
      const position = (val / 100) * trackWidth;
      point.style.left = position + 'px';
      
      point.addEventListener('mousedown', (e) => {
        tumbler.style.left = (position - (tumbler.offsetWidth / 2)) + 'px';
      });
      
      container.appendChild(point);
    });
  </script>
</body>
</html>
